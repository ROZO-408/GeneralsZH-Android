# GeneralsX Android DXVK runtime configuration
#
# Mirrors ios/config/dxvk.conf. The same sampler/Anisotropy baseline applies:
# terrain viewed at the RTS camera's shallow angle smears under trilinear
# filtering; 16x Aniso is cheap on a modern mobile GPU.
d3d9.forceSamplerTypeSpecConstants = False
d3d9.samplerAnisotropy = 16

# No debug logging in normal play (Android logcat already captures stderr).
dxvk.logLevel = none
